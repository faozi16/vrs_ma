global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/catalog-remote-alerts.yml

scrape_configs:
  - job_name: reservation-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["reservation-service:8080"]

  - job_name: catalog-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["catalog-service:8002"]
