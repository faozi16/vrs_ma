spring.application.name=Car Reservation


# application.properties
spring.datasource.url=jdbc:mysql://localhost:3306/car_rsvt
spring.datasource.username=theuser
spring.datasource.password=thepassword
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect

security.jwt.secret=ZmFvemktY3JzLWp3dC1zZWNyZXQtbXVzdC1iZS1hdC1sZWFzdC0zMi1ieXRlcy1sb25nLTIwMjY=
security.jwt.expiration-seconds=3600

# Phase 4: catalog facade boundary switch (local monolith adapter vs remote service client)
app.catalog.read.mode=local
app.catalog.remote.base-url=http://localhost:8002

# Phase 5: resilience policy for remote catalog facade mode
app.catalog.remote.connect-timeout-ms=2000
app.catalog.remote.read-timeout-ms=3000
app.catalog.remote.max-attempts=2
app.catalog.remote.retry-backoff-ms=100

# Phase 6: remote-mode hardening with circuit breaker and fallback policy
app.catalog.remote.circuit.failure-threshold=3
app.catalog.remote.circuit.open-ms=5000
app.catalog.remote.fallback-to-local=true

# Phase 7: expose observability endpoints and Prometheus metrics for remote extraction validation
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.distribution.percentiles-histogram.catalog.facade.remote.latency=true
