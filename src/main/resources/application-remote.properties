# Activates remote Catalog facade mode for extraction testing
app.catalog.read.mode=remote

# Point to extracted Catalog service runtime
app.catalog.remote.base-url=http://localhost:8002
app.catalog.remote.vehicle-by-id-path=/api/vehicles/internal/catalog/{id}

# Remote facade resilience
app.catalog.remote.connect-timeout-ms=2000
app.catalog.remote.read-timeout-ms=3000
app.catalog.remote.max-attempts=2
app.catalog.remote.retry-backoff-ms=100
app.catalog.remote.circuit.failure-threshold=3
app.catalog.remote.circuit.open-ms=5000
app.catalog.remote.fallback-to-local=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.metrics.distribution.percentiles-histogram.catalog.facade.remote.latency=true

app.catalog.cutover.gates.enabled=true
app.catalog.cutover.gates.min-success-ratio=0.95
app.catalog.cutover.gates.max-failure-ratio=0.05
app.catalog.cutover.gates.max-p95-latency-ms=400
app.catalog.cutover.gates.max-circuit-open-count=2
app.catalog.cutover.gates.max-fallback-hit-count=5
app.catalog.cutover.gates.min-observed-calls=10
